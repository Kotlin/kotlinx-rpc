syntax = "proto2";
package kotlinx.rpc.protobuf.test;

import "extension_base.proto";
import "enum.proto";
import "all_primitives.proto";

extend ExtensionBase {
  // Some comment on an extension field
  optional int32 int32 = 10;
  optional string string = 18;
}

// Some comment on an extension group
extend ExtensionBase {
  optional MyEnum enum = 11;
}

extend ExtensionBase {
  optional AllPrimitives msg = 12;
}

extend ExtensionBase {
  optional ExtensionBase subExt = 13;
}

extend ExtensionBase {
  repeated int32 repeatedInt32 = 14 [packed = true];
}

extend ExtensionBase {
  repeated MyEnum repeatedEnum = 15 [packed = true];
}

extend ExtensionBase {
  repeated AllPrimitives repeatedMsg = 16;
  repeated ExtensionBase repeatedSubExt = 17;
}

extend ExtensionBase {
  optional group TestGroup = 19 {
    optional int32 int32 = 1;
    optional string string = 2;
  }
}

extend ExtensionBase {
  optional string conflicting = 20;
}

message MessageScoped {
  optional int32 field = 1;

  extend ExtensionBase {
    optional int32 conflicting = 21;
  }

  message MoreNested {
    extend ExtensionBase {
      optional int32 conflicting = 22;
    }
  }

  extend ExtensionBase {
    optional group TestGroup = 23 {
      optional int32 int32 = 1;
    }
  }
}
