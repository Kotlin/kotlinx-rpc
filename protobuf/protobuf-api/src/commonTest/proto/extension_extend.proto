syntax = "proto2";
package kotlinx.rpc.protobuf.test;

import "extension_base.proto";
import "enum.proto";
import "all_primitives.proto";

extend ExtensionBase {
  optional int32 int32 = 10;
  optional string string = 18;
}

extend ExtensionBase {
  optional MyEnum enum = 11;
}

extend ExtensionBase {
  optional AllPrimitives msg = 12;
}

extend ExtensionBase {
  optional ExtensionBase subExt = 13;
}

extend ExtensionBase {
  repeated int32 repeatedInt32 = 14;
}

extend ExtensionBase {
  repeated MyEnum repeatedEnum = 15;
}

extend ExtensionBase {
  repeated AllPrimitives repeatedMsg = 16;
  repeated ExtensionBase repeatedSubExt = 17;
}


