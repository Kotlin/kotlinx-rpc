name: Verify Konan LLVM Bundle Mapping is Up-to-Date

on:
  pull_request:
    paths:
      - 'versions-root/libs.versions.toml'
      - 'native-deps/bazel-support/toolchain/konan_llvm_bundles.json'
      - 'native-deps/bazel-support/toolchain/precompute_konan_llvm_bundles.py'
      - 'native-deps/bazel-support/toolchain/resolve_konan_llvm_resource_dir.py'
      - '.github/workflows/verify-konan-llvm-bundles.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-konan-llvm-bundles:
    name: Verify mapping
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Sources
        uses: actions/checkout@v4

      - name: Generate Konan LLVM bundle mapping
        run: |
          cd native-deps/bazel-support
          ./toolchain/precompute_konan_llvm_bundles.py
      - name: Check if Konan LLVM bundle mapping is up-to-date
        run: |
          if [[ -n "$(git status --porcelain | grep native-deps/bazel-support/toolchain/konan_llvm_bundles.json)" ]]; then
            echo "Konan LLVM bundle mapping is not up to date. Please run './native-deps/bazel-support/toolchain/precompute_konan_llvm_bundles.py' and commit changes"
            git status --porcelain
            git diff --minimal | cat
            exit 1
          fi
